###############################################################################
# macos-integration-test.yml — macOS native integration test on GitHub Actions
#
# Phase 1: Startup smoke (always)
#   FFI dylib loading, app launch, setup flow, UI navigation
#
# Phase 2: Network integration (when BOOTSTRAP_CONTACT_SEED variable is set)
#   ContactSeed import, peer connection to bootstrap via relay cascade
#
# No signing needed — runs locally on the runner, not distributed.
###############################################################################
name: macOS Integration Test

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/build-macos-libs.sh'
      - 'macos/**'
      - 'lib/core/crypto/*_ffi.dart'
      - 'lib/core/network/contact_seed.dart'
      - 'lib/core/platform/app_paths.dart'
      - 'integration_test/app_test_ci.dart'
      - '.github/workflows/macos-integration-test.yml'

concurrency:
  group: macos-integration-test-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  integration-test:
    name: macOS — Integration Test
    runs-on: macos-14
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja autoconf automake libtool pkg-config libvpx

      - name: Cache native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/macos-libs-build-*
          key: macos-native-libs-${{ hashFiles('scripts/build-macos-libs.sh') }}
          restore-keys: macos-native-libs-

      - name: Build native dylibs
        run: ./scripts/build-macos-libs.sh --arch arm64
        timeout-minutes: 30

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --debug --dart-define=NETWORK_CHANNEL=beta

      - name: Place dylibs in app bundle
        run: |
          APP_PATH="build/macos/Build/Products/Debug/Cleona.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"
          for f in build/macos-libs/arm64/*.dylib; do
            cp "$f" "$FRAMEWORKS/"
            echo "Placed: $(basename $f)"
          done
          echo "=== Dylibs in Frameworks ==="
          ls -lh "$FRAMEWORKS"/*.dylib 2>/dev/null || echo "No dylibs found!"

      - name: Run integration test
        env:
          BOOTSTRAP_CONTACT_SEED: ${{ vars.BOOTSTRAP_CONTACT_SEED }}
        run: |
          flutter test integration_test/app_test_ci.dart -d macos --timeout 120s 2>&1 | tee test-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit $EXIT_CODE

      - name: Collect crash logs on failure
        if: failure()
        run: |
          echo "=== Crash Reports ==="
          find ~/Library/Logs/DiagnosticReports -name "Cleona*" -mmin -10 2>/dev/null | head -5 | while read f; do
            echo "--- $f ---"
            head -50 "$f"
          done
          echo "=== Test Output ==="
          tail -50 test-output.log 2>/dev/null || true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-failure-logs
          path: |
            test-output.log
            ~/Library/Logs/DiagnosticReports/Cleona*
          retention-days: 7
