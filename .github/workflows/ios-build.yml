###############################################################################
# apple-build.yml — Build Cleona for iOS (IPA → TestFlight) and macOS (DMG)
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) with channel + platform selection
#   - Push of a tag matching v*
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID            — 10-char Apple Developer Team ID
#   APP_STORE_CONNECT_KEY_ID — App Store Connect API Key ID
#   APP_STORE_CONNECT_ISSUER — App Store Connect API Issuer UUID
#   APP_STORE_CONNECT_KEY    — App Store Connect API Key (.p8 content, base64)
#   CERT_P12_BASE64          — Apple DISTRIBUTION certificate .p12 (base64). Must be
#                              an "Apple Distribution" cert, NOT a Development cert —
#                              App Store / TestFlight rejects development-signed IPAs.
#   CERT_P12_PASSWORD        — Password for the .p12 file
#   PROVISIONING_PROFILE_B64 — APP STORE provisioning profile (base64) for bundle id
#                              chat.cleona.cleona, named "Cleona App Store" (the name
#                              referenced in ios/ExportOptions.plist). A Development or
#                              Ad-Hoc profile will NOT work for TestFlight upload.
#
# Parallelization (S206):
#   - iOS + macOS jobs run on separate runners in parallel
#   - Within each job, native lib compilation runs in the background while
#     Flutter setup, pub get, and pod install (iOS) / flutter build (macOS)
#     run in the foreground — no idle wait during the ~30min native builds
#   - iOS no longer uses a separate native-libs job (eliminated artifact
#     upload/download overhead + runner provisioning delay)
###############################################################################
name: Apple Build (iOS + macOS)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - live
      platform:
        description: 'Target platform'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ios
          - macos
  push:
    tags:
      - 'v*'

concurrency:
  group: apple-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.6'
  IOS_DEPLOYMENT_TARGET: '15.5'

jobs:
  # ════════════════════════════════════════════════════════════════
  #  iOS Pipeline (native libs + IPA in one job, parallelized)
  # ════════════════════════════════════════════════════════════════
  build-ios:
    name: iOS — Build IPA & TestFlight
    if: github.event.inputs.platform != 'macos'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja autoconf automake libtool pkg-config

      - name: Cache native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/ios-libs-build-*
          key: ios-native-libs-${{ hashFiles('scripts/build-ios-libs.sh') }}
          restore-keys: ios-native-libs-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build native libs + Flutter setup (parallel)
        timeout-minutes: 50
        run: |
          # ── Native libs in background (the long-running part) ──
          ./scripts/build-ios-libs.sh > /tmp/ios-native-build.log 2>&1 &
          NATIVE_PID=$!
          echo "Native libs building in background (PID: $NATIVE_PID)"

          # ── Flutter + CocoaPods in foreground (independent of native libs) ──
          echo "::group::Flutter pub get"
          flutter pub get
          echo "::endgroup::"

          echo "::group::CocoaPods install"
          cd ios && pod install --repo-update && cd ..
          echo "::endgroup::"

          # ── Wait for native libs ──
          echo "Waiting for native libs build to finish..."
          if ! wait $NATIVE_PID; then
            echo "::error::Native libs build failed"
            echo "::group::Native libs build log (last 200 lines)"
            tail -200 /tmp/ios-native-build.log
            echo "::endgroup::"
            exit 1
          fi
          echo "Native libs build complete"

      - name: Place merged archives for Podfile
        run: |
          NATIVE_DIR="ios/CleonaNative"
          XCFW="build/ios-frameworks/libcleona_all.xcframework"

          if [ -d "$XCFW" ]; then
            for slice_dir in "$XCFW"/ios-arm64*; do
              A="$slice_dir/libcleona_all.a"
              [ -f "$A" ] || continue
              if echo "$slice_dir" | grep -q simulator; then
                cp "$A" "$NATIVE_DIR/libcleona_all_simulator.a"
                echo "Placed simulator archive ($(du -h "$A" | cut -f1))"
              else
                cp "$A" "$NATIVE_DIR/libcleona_all_device.a"
                echo "Placed device archive ($(du -h "$A" | cut -f1))"
              fi
            done
          fi

          for f in libcleona_all_device.a libcleona_all_simulator.a; do
            if [ -f "$NATIVE_DIR/$f" ]; then
              echo "Found: $NATIVE_DIR/$f ($(du -h "$NATIVE_DIR/$f" | cut -f1))"
            fi
          done

          if [ ! -f "$NATIVE_DIR/libcleona_all_device.a" ]; then
            echo "ERROR: libcleona_all_device.a not found — native libs will not be linked!"
            echo "Contents of $XCFW:"
            find "$XCFW" -type f 2>/dev/null || echo "(not found)"
            echo "Contents of $NATIVE_DIR:"
            ls -la "$NATIVE_DIR/"
            exit 1
          fi

      - name: Verify native archives
        run: |
          ls -lh ios/CleonaNative/libcleona_all_device.a
          ls -lh ios/CleonaNative/libcleona_all_simulator.a 2>/dev/null || true
          echo "=== Key FFI symbols in archive ==="
          nm -g ios/CleonaNative/libcleona_all_device.a 2>/dev/null | grep ' T ' | grep -E 'sodium_init|OQS_init|ZSTD_compress|opus_encode|whisper_init|cleona_audio_create|cleona_vpx_encoder_create' | head -10
          echo "=== Pods xcconfig check ==="
          grep -r "EXPORTED_SYMBOLS_FILE\|exported_symbols\|DEAD_CODE" ios/Pods/Target\ Support\ Files/Pods-Runner/ 2>/dev/null | head -5
          echo "=== Runner pbxproj EXPORTED_SYMBOLS ==="
          grep -i "EXPORTED_SYMBOLS" ios/Runner.xcodeproj/project.pbxproj 2>/dev/null | head -5 || echo "(not in pbxproj)"

      - name: Verify FFI symbols in iOS export list
        run: bash scripts/check_ios_exports.sh --ci

      - name: Install distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.CERT_P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_B64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/cleona.mobileprovision"
          echo "$PROVISIONING_PROFILE_B64" | base64 --decode > "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID="$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)"
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Determine channel
        id: channel
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          CHANNEL="${INPUT_CHANNEL:-beta}"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Build IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          # iOS exception to the project-wide "Beta IMMER --debug" rule:
          # TestFlight / App Store distribution requires an AOT --release build.
          # A Flutter --debug IPA uses the Dart VM in JIT mode, which needs
          # get-task-allow (development signing) and is rejected by App Store
          # Connect. The beta vs. live distinction is preserved via the
          # NETWORK_CHANNEL dart-define, NOT via the Dart build mode — so a
          # beta TestFlight build is release-mode binary on the beta network.
          # TestFlight rejects a CFBundleVersion that was already uploaded for
          # the same marketing version. Use the monotonic workflow run number as
          # the build number so every upload is unique without hand-bumping
          # pubspec. The marketing version (CFBundleShortVersionString) still
          # comes from pubspec's build-name.
          flutter build ipa \
            --release \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --dart-define="NETWORK_CHANNEL=$BUILD_CHANNEL" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Run smoke tests
        continue-on-error: true
        run: |
          dart test test/smoke/ --reporter expanded \
            --exclude-tags=needs-native \
            || echo "::warning::Some smoke tests failed"

      - name: Diagnose Runner binary symbols
        if: always()
        run: |
          RUNNER=$(find build/ios -path "*/Runner.app/Runner" -not -name "*.plist" -type f 2>/dev/null | head -1)
          if [ -n "$RUNNER" ]; then
            echo "Binary: $RUNNER ($(ls -lh "$RUNNER" | awk '{print $5}'))"
            echo "=== Exported symbols (nm -gU): FFI entry points ==="
            nm -gU "$RUNNER" 2>/dev/null | grep -E 'sodium_init|OQS_init|ZSTD_compress|opus_encode|whisper_init|cleona_audio_create|cleona_vpx_encoder_create' | head -10
            echo "=== Total exported symbol count ==="
            nm -gU "$RUNNER" 2>/dev/null | wc -l
            echo "=== STRIP_STYLE in build settings ==="
            xcodebuild -showBuildSettings -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release 2>/dev/null | grep -E 'STRIP_STYLE|STRIP_INSTALLED|DEAD_CODE|EXPORTED_SYMBOLS' | head -10
          else
            echo "Runner binary not found"
          fi

      - name: List build outputs
        if: always()
        run: |
          echo "=== Archive ==="
          ls -la build/ios/archive/ 2>/dev/null || echo "no archive dir"
          echo "=== IPA ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "no ipa dir"
          find build/ios -name "*.ipa" -o -name "*.xcarchive" 2>/dev/null

      - name: Verify Info.plist privacy keys vs linked frameworks
        run: |
          RUNNER=$(find build/ios -path "*/Runner.app/Runner" -not -name "*.plist" -type f 2>/dev/null | head -1)
          if [ -z "$RUNNER" ]; then
            echo "::error::Runner binary not found — cannot verify privacy keys"
            exit 1
          fi

          PLIST="ios/Runner/Info.plist"
          LINKED=$(otool -L "$RUNNER" 2>/dev/null || true)
          echo "=== Linked frameworks ==="
          echo "$LINKED" | grep '\.framework' | sed 's/^[[:space:]]*/  /'
          echo ""

          FAIL=0
          check_key() {
            local fw="$1" key="$2"
            if echo "$LINKED" | grep -q "${fw}.framework"; then
              if grep -q "<key>${key}</key>" "$PLIST"; then
                echo "OK: ${fw}.framework -> ${key}"
              else
                echo "::error::ITMS-90683: ${fw}.framework linked but ${key} missing from Info.plist"
                FAIL=1
              fi
            fi
          }

          check_key CoreLocation   NSLocationWhenInUseUsageDescription
          check_key AVFoundation   NSCameraUsageDescription
          check_key AVFoundation   NSMicrophoneUsageDescription
          check_key Photos         NSPhotoLibraryUsageDescription
          check_key CoreNFC        NFCReaderUsageDescription
          check_key CoreBluetooth  NSBluetoothAlwaysUsageDescription
          check_key Contacts       NSContactsUsageDescription
          check_key EventKit       NSCalendarsFullAccessUsageDescription
          check_key Speech         NSSpeechRecognitionUsageDescription

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Add missing privacy keys to ios/Runner/Info.plist before uploading"
            exit 1
          fi
          echo "All required privacy keys present for linked frameworks"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          gem install fastlane --no-document

          IPA=$(find build/ios -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "No IPA found — skipping upload"
            exit 1
          fi

          # Use Fastlane Ruby API where is_key_content_base64 actually works
          mkdir -p fastlane
          cat > fastlane/Fastfile <<'FASTFILE'
          lane :upload_testflight do
            api_key = app_store_connect_api_key(
              key_id: ENV['APP_STORE_CONNECT_KEY_ID'],
              issuer_id: ENV['APP_STORE_CONNECT_ISSUER'],
              key_content: ENV['APP_STORE_CONNECT_KEY'],
              is_key_content_base64: true,
              in_house: false
            )
            pilot(
              api_key: api_key,
              ipa: ENV['IPA_PATH'],
              distribute_external: true,
              groups: ["CleonaWeitereTestUser"],
              skip_waiting_for_build_processing: false,
              reject_build_waiting_for_review: true,
              notify_external_testers: true,
              changelog: "Bug fixes and improvements"
            )
          end
          FASTFILE

          MAX_RETRIES=3
          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "TestFlight upload attempt $ATTEMPT/$MAX_RETRIES..."
            if IPA_PATH="$IPA" fastlane upload_testflight; then
              echo "Upload successful"
              exit 0
            fi
            if [ "$ATTEMPT" -eq "$MAX_RETRIES" ]; then
              echo "::error::TestFlight upload failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "::warning::Upload attempt $ATTEMPT failed (App Store Connect transient error) — retrying in 30s..."
            sleep 30
          done

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleona-ios-${{ steps.channel.outputs.channel }}
          path: |
            build/ios/ipa/
            build/ios/archive/Runner.xcarchive/Products/Applications/
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════
  #  macOS Pipeline (runs in parallel with iOS on separate runner)
  # ════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS — Build & Notarize
    if: github.event.inputs.platform != 'ios'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja autoconf automake libtool pkg-config libvpx

      - name: Cache native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/macos-libs-build-*
          key: macos-native-libs-${{ hashFiles('scripts/build-macos-libs.sh') }}
          restore-keys: macos-native-libs-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Determine channel
        id: channel
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          CHANNEL="${INPUT_CHANNEL:-beta}"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Build native libs + Flutter app (parallel)
        timeout-minutes: 35
        env:
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          # ── Native libs in background (the long-running part) ──
          ./scripts/build-macos-libs.sh --arch arm64 > /tmp/macos-native-build.log 2>&1 &
          NATIVE_PID=$!
          echo "Native libs building in background (PID: $NATIVE_PID)"

          # ── Flutter build in foreground (independent of native dylibs) ──
          echo "::group::Flutter pub get"
          flutter pub get
          echo "::endgroup::"

          echo "::group::Build macOS app"
          BUILD_MODE="--debug"
          if [ "$BUILD_CHANNEL" = "live" ]; then BUILD_MODE="--release"; fi
          flutter build macos $BUILD_MODE --dart-define="NETWORK_CHANNEL=$BUILD_CHANNEL"
          echo "::endgroup::"

          echo "::group::Compile daemon"
          dart compile exe lib/service_daemon.dart -o build/cleona-daemon-macos
          echo "::endgroup::"

          # ── Wait for native libs ──
          echo "Waiting for native libs build to finish..."
          if ! wait $NATIVE_PID; then
            echo "::error::Native libs build failed"
            echo "::group::Native libs build log (last 200 lines)"
            tail -200 /tmp/macos-native-build.log
            echo "::endgroup::"
            exit 1
          fi
          echo "Native libs build complete"

      - name: Assemble app bundle
        env:
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          BUILD_CONFIG="Debug"
          if [ "$BUILD_CHANNEL" = "live" ]; then BUILD_CONFIG="Release"; fi
          APP_PATH="build/macos/Build/Products/$BUILD_CONFIG/Cleona.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          MACOS_BIN="$APP_PATH/Contents/MacOS"
          mkdir -p "$FRAMEWORKS"

          for f in build/macos-libs/arm64/*.dylib; do
            cp "$f" "$FRAMEWORKS/"
          done

          if [ ! -f "$FRAMEWORKS/cleona_audio.dylib" ]; then
            echo "::error::cleona_audio.dylib missing from Contents/Frameworks — calls would have no audio"
            exit 1
          fi

          cp build/cleona-daemon-macos "$MACOS_BIN/cleona-daemon"
          chmod +x "$MACOS_BIN/cleona-daemon"

      - name: Sign app bundle
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.CERT_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          BUILD_CONFIG="Debug"
          if [ "$BUILD_CHANNEL" = "live" ]; then BUILD_CONFIG="Release"; fi
          APP_PATH="build/macos/Build/Products/$BUILD_CONFIG/Cleona.app"

          for f in "$APP_PATH/Contents/Frameworks"/*.dylib "$APP_PATH/Contents/MacOS/cleona-daemon"; do
            codesign --force --sign - "$f" || true
          done
          codesign --force --deep --sign - "$APP_PATH"

      - name: Create DMG
        env:
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          BUILD_CONFIG="Debug"
          if [ "$BUILD_CHANNEL" = "live" ]; then BUILD_CONFIG="Release"; fi
          APP_PATH="build/macos/Build/Products/$BUILD_CONFIG/Cleona.app"
          DMG_PATH="build/cleona-chat-macos-arm64.dmg"
          hdiutil create -volname "Cleona Chat" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Notarize DMG
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc-key.p8"
          echo "$APP_STORE_CONNECT_KEY" | base64 --decode > "$KEY_PATH"

          xcrun notarytool submit \
            build/cleona-chat-macos-arm64.dmg \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER" \
            --wait || echo "Notarization failed or timed out — DMG still available as artifact"

          xcrun stapler staple build/cleona-chat-macos-arm64.dmg || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleona-macos-${{ steps.channel.outputs.channel }}
          path: build/cleona-chat-macos-arm64.dmg
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
