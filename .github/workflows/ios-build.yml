###############################################################################
# apple-build.yml — Build Cleona for iOS (IPA → TestFlight) and macOS (DMG)
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) with channel + platform selection
#   - Push of a tag matching v*
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID            — 10-char Apple Developer Team ID
#   APP_STORE_CONNECT_KEY_ID — App Store Connect API Key ID
#   APP_STORE_CONNECT_ISSUER — App Store Connect API Issuer UUID
#   APP_STORE_CONNECT_KEY    — App Store Connect API Key (.p8 content, base64)
#   CERT_P12_BASE64          — Distribution certificate .p12 (base64-encoded)
#   CERT_P12_PASSWORD        — Password for the .p12 file
#   PROVISIONING_PROFILE_B64 — Provisioning profile (base64-encoded)
###############################################################################
name: Apple Build (iOS + macOS)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - live
      platform:
        description: 'Target platform'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ios
          - macos
  push:
    tags:
      - 'v*'

concurrency:
  group: apple-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.2'
  IOS_DEPLOYMENT_TARGET: '15.5'

jobs:
  # ════════════════════════════════════════════════════════════════
  #  iOS Pipeline
  # ════════════════════════════════════════════════════════════════
  build-ios-native-libs:
    name: iOS — Native Libraries
    if: github.event.inputs.platform != 'macos'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja autoconf automake libtool pkg-config

      - name: Cache native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/ios-libs-build-*
          key: ios-native-libs-${{ hashFiles('scripts/build-ios-libs.sh') }}
          restore-keys: ios-native-libs-

      - name: Build all native libs
        run: ./scripts/build-ios-libs.sh
        timeout-minutes: 45

      - name: Upload XCFrameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframeworks
          path: build/ios-frameworks/
          retention-days: 7

  build-ipa:
    name: iOS — Build IPA & TestFlight
    needs: build-ios-native-libs
    if: github.event.inputs.platform != 'macos'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download XCFrameworks
        uses: actions/download-artifact@v4
        with:
          name: ios-xcframeworks
          path: build/ios-frameworks/

      - name: Place merged archives for Podfile
        run: |
          # The build script creates libcleona_all.xcframework with device and
          # simulator slices. Extract the .a files into ios/CleonaNative/ where
          # the Podfile post_install hook expects them.
          NATIVE_DIR="ios/CleonaNative"
          XCFW="build/ios-frameworks/libcleona_all.xcframework"

          # XCFramework directory structure:
          #   ios-arm64/libcleona_all.a          (device)
          #   ios-arm64_x86_64-simulator/...     (simulator, if built)
          # The directory names may vary; find them by platform.
          if [ -d "$XCFW" ]; then
            for slice_dir in "$XCFW"/ios-arm64*; do
              A="$slice_dir/libcleona_all.a"
              [ -f "$A" ] || continue
              if echo "$slice_dir" | grep -q simulator; then
                cp "$A" "$NATIVE_DIR/libcleona_all_simulator.a"
                echo "Placed simulator archive ($(du -h "$A" | cut -f1))"
              else
                cp "$A" "$NATIVE_DIR/libcleona_all_device.a"
                echo "Placed device archive ($(du -h "$A" | cut -f1))"
              fi
            done
          fi

          # Also check if build script already placed them directly
          for f in libcleona_all_device.a libcleona_all_simulator.a; do
            if [ -f "$NATIVE_DIR/$f" ]; then
              echo "Found: $NATIVE_DIR/$f ($(du -h "$NATIVE_DIR/$f" | cut -f1))"
            fi
          done

          # Verify at least the device archive exists (required for IPA)
          if [ ! -f "$NATIVE_DIR/libcleona_all_device.a" ]; then
            echo "ERROR: libcleona_all_device.a not found — native libs will not be linked!"
            echo "Contents of $XCFW:"
            find "$XCFW" -type f 2>/dev/null || echo "(not found)"
            echo "Contents of $NATIVE_DIR:"
            ls -la "$NATIVE_DIR/"
            exit 1
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Prepare force_load path
        run: |
          DEVICE_A="$(pwd)/ios/CleonaNative/libcleona_all_device.a"
          if [ ! -f "$DEVICE_A" ]; then
            echo "ERROR: $DEVICE_A not found"
            ls -la ios/CleonaNative/
            exit 1
          fi
          echo "FORCE_LOAD_PATH=$DEVICE_A" >> "$GITHUB_ENV"
          echo "Archive size: $(du -h "$DEVICE_A" | cut -f1)"

      - name: Install distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.CERT_P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_B64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/cleona.mobileprovision"
          echo "$PROVISIONING_PROFILE_B64" | base64 --decode > "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID="$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)"
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Determine channel
        id: channel
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          CHANNEL="${INPUT_CHANNEL:-beta}"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Compile Dart AOT
        env:
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          # flutter build ios --no-codesign compiles Dart to AOT, runs pod
          # install, and generates all Xcode project files. We use this ONLY
          # for the Dart compilation — we do NOT use its xcodebuild output.
          flutter build ios --release --no-codesign \
            --dart-define="NETWORK_CHANNEL=$BUILD_CHANNEL"

      - name: Inject force_load into Pods xcconfigs
        run: |
          # NOW pod install has run (inside flutter build ios). The Pods
          # xcconfigs are final. Inject -force_load before our own xcodebuild.
          FORCE_FLAG="-force_load $FORCE_LOAD_PATH"
          XCCONFIG_DIR="ios/Pods/Target Support Files/Pods-Runner"
          for xcconfig in "$XCCONFIG_DIR"/Pods-Runner.*.xcconfig; do
            [ -f "$xcconfig" ] || continue
            if ! grep -q 'force_load' "$xcconfig"; then
              sed -i '' "s|^OTHER_LDFLAGS = \(.*\)|OTHER_LDFLAGS = \1 $FORCE_FLAG|" "$xcconfig"
              echo "  $(basename "$xcconfig"): injected"
            fi
          done
          grep 'force_load' "$XCCONFIG_DIR"/*.xcconfig | head -3

      - name: Archive and export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # xcodebuild archive re-links the Runner binary. Since we injected
          # -force_load into the Pods xcconfigs, the linker will now include
          # all native FFI symbols from libcleona_all_device.a.
          # Clean DerivedData to force a fresh link (Xcode caches the linked
          # binary there and skips re-linking if sources haven't changed).
          rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-*
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tail -30

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: List build outputs
        if: always()
        run: |
          echo "=== Archive ==="
          ls -la build/ios/archive/ 2>/dev/null || echo "no archive dir"
          echo "=== IPA ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "no ipa dir"
          find build/ios -name "*.ipa" -o -name "*.xcarchive" 2>/dev/null

      - name: Upload to TestFlight
        continue-on-error: true
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          # Write the decoded .p8 into a dedicated temp directory named exactly
          # AuthKey_<KEY_ID>.p8 so altool's JWT generator finds it unambiguously.
          # altool searches for the file in: ./private_keys, ~/private_keys,
          # ~/.private_keys, ~/.appstoreconnect/private_keys, and $API_PRIVATE_KEYS_DIR.
          # Using $API_PRIVATE_KEYS_DIR makes the lookup explicit and immune to
          # working-directory changes. altool is deprecated since Xcode 14 but
          # remains the only CLI path for iOS IPA upload (notarytool is macOS-only).
          KEY_DIR="$RUNNER_TEMP/asc-private-keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_KEY" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          IPA=$(find build/ios -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            API_PRIVATE_KEYS_DIR="$KEY_DIR" xcrun altool --upload-app \
              --type ios \
              --file "$IPA" \
              --apiKey "$APP_STORE_CONNECT_KEY_ID" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER" \
              --verbose
          else
            echo "No IPA found — skipping upload"
          fi

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleona-ios-${{ steps.channel.outputs.channel }}
          path: |
            build/ios/ipa/
            build/ios/archive/Runner.xcarchive/Products/Applications/
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════
  #  macOS Pipeline (runs in parallel with iOS)
  # ════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS — Build & Notarize
    if: github.event.inputs.platform != 'ios'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja autoconf automake libtool pkg-config libvpx

      - name: Cache native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/macos-libs-build-*
          key: macos-native-libs-${{ hashFiles('scripts/build-macos-libs.sh') }}
          restore-keys: macos-native-libs-

      - name: Build native dylibs
        run: ./scripts/build-macos-libs.sh --arch arm64
        timeout-minutes: 30

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Determine channel
        id: channel
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          CHANNEL="${INPUT_CHANNEL:-beta}"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Build macOS app
        env:
          BUILD_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          flutter build macos --release --dart-define="NETWORK_CHANNEL=$BUILD_CHANNEL"

      - name: Compile daemon
        run: dart compile exe lib/service_daemon.dart -o build/cleona-daemon-macos

      - name: Assemble app bundle
        run: |
          APP_PATH="build/macos/Build/Products/Release/Cleona.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          MACOS_BIN="$APP_PATH/Contents/MacOS"
          mkdir -p "$FRAMEWORKS"

          for f in build/macos-libs/arm64/*.dylib; do
            cp "$f" "$FRAMEWORKS/"
          done

          cp build/cleona-daemon-macos "$MACOS_BIN/cleona-daemon"
          chmod +x "$MACOS_BIN/cleona-daemon"

      - name: Sign app bundle
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.CERT_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          APP_PATH="build/macos/Build/Products/Release/Cleona.app"

          for f in "$APP_PATH/Contents/Frameworks"/*.dylib "$APP_PATH/Contents/MacOS/cleona-daemon"; do
            codesign --force --sign - "$f" || true
          done
          codesign --force --deep --sign - "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Cleona.app"
          DMG_PATH="build/cleona-chat-macos-arm64.dmg"
          hdiutil create -volname "Cleona Chat" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Notarize DMG
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc-key.p8"
          echo "$APP_STORE_CONNECT_KEY" | base64 --decode > "$KEY_PATH"

          xcrun notarytool submit \
            build/cleona-chat-macos-arm64.dmg \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER" \
            --wait || echo "Notarization failed or timed out — DMG still available as artifact"

          xcrun stapler staple build/cleona-chat-macos-arm64.dmg || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleona-macos-${{ steps.channel.outputs.channel }}
          path: build/cleona-chat-macos-arm64.dmg
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
