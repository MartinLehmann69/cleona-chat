###############################################################################
# screenshots.yml — Generate App Store screenshots via macOS + iOS Simulator
#
# One-time workflow to produce screenshots for App Store Connect listings.
# Builds macOS app + iOS Simulator app, seeds a demo profile, takes
# screenshots of key screens, uploads as artifacts.
###############################################################################
name: App Store Screenshots

on:
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  screenshots:
    name: Generate Screenshots
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja autoconf automake libtool pkg-config libvpx

      # ════════════════════════════════════════════════════════════════
      #  Build macOS native libs + app
      # ════════════════════════════════════════════════════════════════
      - name: Cache macOS native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/macos-libs-build-*
          key: macos-native-libs-${{ hashFiles('scripts/build-macos-libs.sh') }}
          restore-keys: macos-native-libs-

      - name: Build macOS native libs
        run: ./scripts/build-macos-libs.sh --arch arm64
        timeout-minutes: 30

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --debug

      - name: Compile daemon
        run: dart compile exe lib/service_daemon.dart -o build/cleona-daemon-macos

      - name: Write init_profile helper
        run: |
          cat > /tmp/create_profile.dart << 'DART'
          import 'dart:convert';
          import 'dart:io';
          import 'dart:typed_data';
          import 'package:cleona/core/crypto/sodium_ffi.dart';
          import 'package:cleona/core/crypto/oqs_ffi.dart';
          import 'package:cleona/core/identity/identity_manager.dart';
          import 'package:cleona/core/node/identity_context.dart';
          import 'package:cleona/core/crypto/network_secret.dart';
          Future<void> main() async {
            SodiumFFI();
            OqsFFI().init();
            final home = Platform.environment['HOME']!;
            final baseDir = '$home/.cleona';
            Directory(baseDir).createSync(recursive: true);
            // Do NOT init KeyringService — security CLI -T '' hangs without TTY
            final mgr = IdentityManager(baseDir: baseDir);
            if (!mgr.hasMasterSeed()) mgr.generateSeedPhrase();
            final identity = await mgr.createIdentity('Alice');
            final masterSeed = mgr.loadMasterSeed();
            final ctx = IdentityContext(
              profileDir: identity.profileDir,
              displayName: 'Alice',
              networkChannel: NetworkSecret.channel.name,
              hdIndex: identity.hdIndex,
              masterSeed: masterSeed,
            );
            await ctx.initKeys();
            final ids = mgr.loadIdentities();
            for (final id in ids) {
              if (id.id == identity.id) id.nodeIdHex = ctx.userIdHex;
            }
            mgr.saveIdentities(ids);
            mgr.setActiveIdentity(identity);
            File('$baseDir/last_profile.json').writeAsStringSync(
              '{"identityId":"${ids.first.id}","profileDir":"${ids.first.profileDir}"}');
            File('${ids.first.profileDir}/port').writeAsStringSync('8081');
            // Export seed+phrase as base64 for CI keychain injection
            File('$baseDir/.ci_seed_b64').writeAsStringSync(
              base64Encode(masterSeed!));
            final phrase = mgr.loadSeedPhrase();
            if (phrase != null) {
              final phraseBytes = Uint8List.fromList(phrase.join(' ').codeUnits);
              File('$baseDir/.ci_phrase_b64').writeAsStringSync(
                base64Encode(phraseBytes));
            }
            print('Profile created at $baseDir');
            exit(0);
          }
          DART

      - name: Assemble macOS app bundle
        run: |
          APP_PATH="build/macos/Build/Products/Debug/Cleona.app"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"
          MACOS_BIN="$APP_PATH/Contents/MacOS"
          mkdir -p "$FRAMEWORKS"

          for f in build/macos-libs/arm64/*.dylib; do
            cp "$f" "$FRAMEWORKS/"
          done

          cp build/cleona-daemon-macos "$MACOS_BIN/cleona-daemon"
          chmod +x "$MACOS_BIN/cleona-daemon"
          codesign --force --deep --sign - "$APP_PATH"

      # ════════════════════════════════════════════════════════════════
      #  Build iOS Simulator app
      # ════════════════════════════════════════════════════════════════
      - name: Cache iOS native lib sources
        uses: actions/cache@v4
        with:
          path: /tmp/ios-libs-build-*
          key: ios-native-libs-${{ hashFiles('scripts/build-ios-libs.sh') }}
          restore-keys: ios-native-libs-

      - name: Build iOS native libs
        continue-on-error: true
        run: ./scripts/build-ios-libs.sh
        timeout-minutes: 45

      - name: Place iOS native archives
        continue-on-error: true
        run: |
          NATIVE_DIR="ios/CleonaNative"
          XCFW="build/ios-frameworks/libcleona_all.xcframework"
          if [ -d "$XCFW" ]; then
            for slice_dir in "$XCFW"/ios-arm64*; do
              A="$slice_dir/libcleona_all.a"
              [ -f "$A" ] || continue
              if echo "$slice_dir" | grep -q simulator; then
                cp "$A" "$NATIVE_DIR/libcleona_all_simulator.a"
                echo "Placed simulator archive"
              else
                cp "$A" "$NATIVE_DIR/libcleona_all_device.a"
                echo "Placed device archive"
              fi
            done
          fi

      - name: Install CocoaPods
        continue-on-error: true
        run: cd ios && pod install --repo-update

      - name: Generate Flutter iOS framework
        continue-on-error: true
        run: flutter build ios --debug --no-codesign

      - name: Build iOS Simulator app
        continue-on-error: true
        run: |
          xcodebuild build \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            -derivedDataPath build/ios-sim \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcodebuild-sim.log | tail -40
          echo "---"
          if grep -q "BUILD FAILED" /tmp/xcodebuild-sim.log; then
            echo "=== BUILD ERRORS ==="
            grep -E "error:|fatal|undefined|cannot find" /tmp/xcodebuild-sim.log | head -20
          fi
          find build/ios-sim -name "Runner.app" -type d 2>/dev/null
          find build/ios-sim -name "Runner" -not -name "*.app" -type f 2>/dev/null | head -3

      # ════════════════════════════════════════════════════════════════
      #  Setup keychain + Create demo profile
      # ════════════════════════════════════════════════════════════════
      - name: Setup CI keychain
        if: always()
        run: |
          KEYCHAIN_PASSWORD="ci_screenshots_temp"
          KEYCHAIN_PATH="$HOME/Library/Keychains/ci-screenshots.keychain-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend to search list and make default
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "Keychain created and unlocked: $KEYCHAIN_PATH"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Make native libs available for init-profile
        if: always()
        run: |
          sudo mkdir -p /usr/local/lib
          for f in build/macos-libs/arm64/*.dylib; do
            sudo cp "$f" /usr/local/lib/
          done

      - name: Create demo profile
        if: always()
        run: |
          DYLD_LIBRARY_PATH=/usr/local/lib dart --packages=.dart_tool/package_config.json /tmp/create_profile.dart
          echo "=== Profile ==="
          ls -la "$HOME/.cleona/"

      - name: Populate keychain and finalize profile
        if: always()
        run: |
          BASE="$HOME/.cleona"

          # Save a copy for iOS simulator (uses file-based keyring, not macOS keychain)
          cp -r "$BASE" "$BASE-ios-backup"

          # Store seed/phrase in keychain with -A (unrestricted access, no TTY needed)
          SEED_B64=$(cat "$BASE/.ci_seed_b64")
          security add-generic-password -a cleona -s cleona_master_seed -w "$SEED_B64" -A "$KEYCHAIN_PATH"
          echo "master_seed stored in keychain"

          if [ -f "$BASE/.ci_phrase_b64" ]; then
            PHRASE_B64=$(cat "$BASE/.ci_phrase_b64")
            security add-generic-password -a cleona -s cleona_seed_phrase -w "$PHRASE_B64" -A "$KEYCHAIN_PATH"
            echo "seed_phrase stored in keychain"
          fi

          # Delete legacy .enc files (seed+phrase now in keychain)
          rm -f "$BASE/master_seed.json.enc" "$BASE/seed_phrase.json.enc"

          # Delete db.key (keys.json is already encrypted with derived key)
          rm -f "$BASE/db.key"

          # Write migration markers so the app skips keyring migration
          date -u +%Y-%m-%dT%H:%M:%SZ > "$BASE/.keyring_migrated"
          date -u +%Y-%m-%dT%H:%M:%SZ > "$BASE/.keyring_repair_v2"

          # Clean up temp files
          rm -f "$BASE/.ci_seed_b64" "$BASE/.ci_phrase_b64"

          echo "=== Final profile ==="
          ls -la "$BASE/"

      - name: Allow keychain access without prompts
        if: always()
        run: |
          # Set partition list to allow security CLI and all Apple tools access
          security set-key-partition-list \
            -S "apple-tool:,apple:,teamid:,:" \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" 2>/dev/null || true

          # Verify the keychain entries exist
          security find-generic-password -a cleona -s cleona_master_seed "$KEYCHAIN_PATH" >/dev/null 2>&1 && \
            echo "master_seed found in keychain" || echo "master_seed NOT in keychain"
          security find-generic-password -a cleona -s cleona_seed_phrase "$KEYCHAIN_PATH" >/dev/null 2>&1 && \
            echo "seed_phrase found in keychain" || echo "seed_phrase NOT in keychain"

      # ════════════════════════════════════════════════════════════════
      #  macOS Screenshots
      # ════════════════════════════════════════════════════════════════
      - name: Take macOS screenshots
        if: always()
        run: |
          set +e
          APP="build/macos/Build/Products/Debug/Cleona.app"
          SCREENSHOTS="build/screenshots/macos"
          mkdir -p "$SCREENSHOTS"

          # Launch the app
          open "$APP"
          echo "App launched, waiting 30s for startup..."
          sleep 30

          # Bring app to front
          osascript -e 'tell application "Cleona" to activate' 2>/dev/null || true
          sleep 3

          # List visible processes for debugging
          osascript -e 'tell application "System Events" to get name of every process whose visible is true' || true

          # Check if IPC socket exists (daemon started successfully)
          ls -la "$HOME/.cleona/cleona.sock" 2>/dev/null || echo "WARNING: No IPC socket found"

          # Grant screen recording permission via TCC database (avoids persistent dialog)
          echo "Granting screen recording permission..."
          for client in /usr/sbin/screencapture /bin/bash /bin/zsh; do
            sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
              "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version) \
               VALUES ('kTCCServiceScreenCapture', '$client', 1, 2, 4, 1);" 2>/dev/null && \
              echo "  Granted: $client" || echo "  WARN: TCC insert failed for $client"
          done
          # Also dismiss any remaining system dialogs (e.g. local network)
          osascript <<'DISMISS' 2>/dev/null || true
          tell application "System Events"
            set procNames to name of every process whose visible is true
            repeat with procName in procNames
              try
                set proc to first process whose name is procName
                repeat with w in windows of proc
                  try
                    if exists button "Allow" of w then
                      click button "Allow" of w
                      delay 1
                    end if
                  end try
                end repeat
              end try
            end repeat
          end tell
          DISMISS
          sleep 3
          # Re-activate Cleona after any dialog dismissal
          osascript -e 'tell application "Cleona" to activate' 2>/dev/null || true
          sleep 2

          # Helper function for IPC
          ipc_cmd() {
            python3 -c "
          import socket, json, time, sys
          sock_path = '$HOME/.cleona/cleona.sock'
          try:
            s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
            s.settimeout(5)
            s.connect(sock_path)
            cmd = json.dumps({'type':'request','id':$1,'command':'$2','params':$3})
            s.sendall((cmd + '\n').encode())
            resp = b''
            while True:
              chunk = s.recv(8192)
              if not chunk: break
              resp += chunk
              if b'\n' in resp: break
            s.close()
            print(resp.decode().strip())
          except Exception as e:
            print(f'IPC error: {e}', file=sys.stderr)
          " 2>&1
          }

          # Get CGWindowID using Quartz (not System Events which returns wrong ID)
          WINID=$(python3 -c "
          try:
            import Quartz
            windows = Quartz.CGWindowListCopyWindowInfo(
              Quartz.kCGWindowListOptionOnScreenOnly | Quartz.kCGWindowListExcludeDesktopElements,
              Quartz.kCGNullWindowID)
            for w in windows:
              owner = w.get('kCGWindowOwnerName', '')
              layer = w.get('kCGWindowLayer', 999)
              if owner == 'Cleona' and layer == 0:
                print(w.get('kCGWindowNumber', ''))
                break
          except:
            pass
          " 2>/dev/null)
          echo "Window ID: $WINID"

          # Capture function: window if available, else full screen
          capture() {
            if [ -n "$WINID" ]; then
              screencapture -x -l "$WINID" "$1"
            else
              screencapture -x "$1"
            fi
          }

          # Screenshot 1: Home screen (chat list)
          sleep 3
          capture "$SCREENSHOTS/01-home.png"
          echo "Captured: 01-home.png ($(du -h "$SCREENSHOTS/01-home.png" | cut -f1))"

          # Screenshot 2: Settings
          ipc_cmd 1 gui_action '{"action":"open_settings"}'
          sleep 4
          capture "$SCREENSHOTS/02-settings.png"
          echo "Captured: 02-settings.png"

          # Screenshot 3: Calendar
          ipc_cmd 2 gui_action '{"action":"go_back"}'
          sleep 2
          ipc_cmd 3 gui_action '{"action":"open_calendar"}'
          sleep 4
          capture "$SCREENSHOTS/03-calendar.png"
          echo "Captured: 03-calendar.png"

          # Screenshot 4: Network stats
          ipc_cmd 4 gui_action '{"action":"go_back"}'
          sleep 2
          ipc_cmd 5 gui_action '{"action":"open_network_stats"}'
          sleep 4
          capture "$SCREENSHOTS/04-network.png"
          echo "Captured: 04-network.png"

          # Screenshot 5: Identity detail
          ipc_cmd 6 gui_action '{"action":"go_back"}'
          sleep 2
          ipc_cmd 7 gui_action '{"action":"open_identity_detail"}'
          sleep 4
          capture "$SCREENSHOTS/05-identity.png"
          echo "Captured: 05-identity.png"

          # Kill the app
          osascript -e 'tell application "Cleona" to quit' 2>/dev/null || killall Cleona 2>/dev/null || true
          sleep 3

          echo "=== macOS screenshots ==="
          ls -la "$SCREENSHOTS/"

      # ════════════════════════════════════════════════════════════════
      #  iOS Simulator Screenshots
      # ════════════════════════════════════════════════════════════════
      - name: Take iOS screenshots
        if: always()
        run: |
          set +e
          SCREENSHOTS="build/screenshots/ios"
          mkdir -p "$SCREENSHOTS"

          # Find a suitable iPhone simulator (6.7" display)
          echo "Available simulators:"
          xcrun simctl list devices available | grep -i "iphone"

          DEVICE=""
          for model in "iPhone 17 Pro Max" "iPhone 16 Pro Max" "iPhone 15 Pro Max" "iPhone 17 Pro" "iPhone 16 Pro"; do
            DEVICE=$(xcrun simctl list devices available | grep "$model" | head -1 | grep -oE '[A-F0-9-]{36}')
            [ -n "$DEVICE" ] && echo "Selected: $model ($DEVICE)" && break
          done

          if [ -z "$DEVICE" ]; then
            echo "No Pro Max found, trying any large iPhone..."
            DEVICE=$(xcrun simctl list devices available | grep -i "iphone.*max\|iphone.*pro" | head -1 | grep -oE '[A-F0-9-]{36}')
          fi

          if [ -z "$DEVICE" ]; then
            echo "No suitable iPhone simulator found"
            xcrun simctl list devices available | grep -i iphone
            exit 0
          fi

          echo "Booting simulator $DEVICE..."
          xcrun simctl boot "$DEVICE" 2>/dev/null || true
          sleep 15

          # Set status bar to a clean state
          xcrun simctl status_bar "$DEVICE" override --time "9:41" --batteryState charged --batteryLevel 100 2>/dev/null || true

          # Find the iOS simulator .app
          SIM_APP=""
          for p in \
            "build/ios-sim/Build/Products/Debug-iphonesimulator/Runner.app" \
            "build/ios/iphonesimulator/Runner.app" \
            "build/ios/Debug-iphonesimulator/Runner.app"; do
            [ -d "$p" ] && SIM_APP="$p" && break
          done

          if [ -z "$SIM_APP" ]; then
            SIM_APP=$(find build/ios-sim build/ios -name "Runner.app" -path "*simulator*" -type d 2>/dev/null | head -1)
          fi

          # Verify executable exists inside the .app
          if [ -n "$SIM_APP" ]; then
            if [ ! -f "$SIM_APP/Runner" ]; then
              echo "ERROR: $SIM_APP exists but has no Runner executable"
              ls -la "$SIM_APP/"
              SIM_APP=""
            fi
          fi

          if [ -z "$SIM_APP" ]; then
            echo "ERROR: No valid iOS simulator app found — skipping iOS screenshots"
            echo "Build log errors:"
            grep -E "error:|BUILD FAILED" /tmp/xcodebuild-sim.log 2>/dev/null | head -10
          else
            echo "Installing: $SIM_APP"
            xcrun simctl install "$DEVICE" "$SIM_APP"

            # Pre-populate the app container with the demo profile
            sleep 3
            CONTAINER=$(xcrun simctl get_app_container "$DEVICE" chat.cleona.cleona data 2>/dev/null || true)
            echo "App container: $CONTAINER"

            # Use the pre-migration backup (iOS uses file-based keyring, not macOS keychain)
            IOS_PROFILE="$HOME/.cleona-ios-backup"
            if [ -n "$CONTAINER" ] && [ -d "$IOS_PROFILE" ]; then
              echo "Copying demo profile into simulator container..."
              mkdir -p "$CONTAINER/Documents/.cleona"
              cp -r "$IOS_PROFILE/"* "$CONTAINER/Documents/.cleona/" 2>/dev/null || true
              echo "Profile copied"
              ls -la "$CONTAINER/Documents/.cleona/" 2>/dev/null || true
            fi

            # Launch the app
            echo "Launching app..."
            xcrun simctl launch "$DEVICE" chat.cleona.cleona
            sleep 20

            # Screenshot 1: Home screen
            xcrun simctl io "$DEVICE" screenshot "$SCREENSHOTS/01-home.png"
            echo "Captured: ios/01-home.png"

            # Wait and take more
            sleep 5
            xcrun simctl io "$DEVICE" screenshot "$SCREENSHOTS/02-main.png"
            echo "Captured: ios/02-main.png"

            sleep 3
            xcrun simctl io "$DEVICE" screenshot "$SCREENSHOTS/03-loaded.png"
            echo "Captured: ios/03-loaded.png"
          fi

          # Shutdown simulator
          xcrun simctl shutdown "$DEVICE" 2>/dev/null || true

          echo "=== iOS screenshots ==="
          ls -la "$SCREENSHOTS/" 2>/dev/null || echo "(none)"

      # ════════════════════════════════════════════════════════════════
      #  Upload
      # ════════════════════════════════════════════════════════════════
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appstore-screenshots
          path: build/screenshots/
          retention-days: 30
