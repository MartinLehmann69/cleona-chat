  // mid-rotation (§7.4 — same trust-bootstrap rationale as
  // RESTORE_BROADCAST). Bodies are pre-existing
  // GuardianShareStore / GuardianRestoreRequest / GuardianRestoreResponse.
  MTV3_GUARDIAN_SHARE_STORE       = 35;
